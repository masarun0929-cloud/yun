name: Update static data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-static-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate docs/data JSON from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: node tools/generate_static_data.mjs

      - name: Commit and push static data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/meta.json docs/data/songs.json docs/data/streams.json docs/data/lives.json
          if git diff --cached --quiet; then
            echo "No static data changes."
          else
            git commit -m "Update static data"
            git push
          fi
