name: Update static data

on:
  workflow_dispatch:
    inputs:
      source:
        description: Request source
        required: false
        default: manual
      requested_at:
        description: Request timestamp
        required: false
        default: ''
      environment:
        description: Target data environment
        required: false
        default: production
        type: choice
        options:
          - production

permissions:
  contents: write

concurrency:
  group: update-static-data-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  update-static-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate docs/data JSON from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: node tools/generate_static_data.mjs

      - name: Commit and push static data
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'production' }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/meta.json docs/data/songs.json docs/data/streams.json docs/data/lives.json
          if git diff --cached --quiet; then
            echo "No static data changes."
          else
            git commit -m "Update ${TARGET_ENV} static data"
            git push origin "HEAD:${TARGET_REF}"
          fi
